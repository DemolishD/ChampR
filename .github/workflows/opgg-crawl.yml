name: OP.GG Crawl

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Game mode to crawl"
        required: true
        type: choice
        options:
          - ranked
          - aram
          - urf
          - aram-mayhem
          - all
        default: ranked
      champions:
        description: "Champion list (comma-separated, empty = all champions)"
        required: false
        type: string
        default: ""
      region:
        description: "Region"
        required: false
        type: string
        default: kr
      tier:
        description: "Tier"
        required: false
        type: string
        default: diamond_plus
      concurrency:
        description: "Max concurrent browsers"
        required: false
        type: string
        default: "3"

jobs:
  # Resolve the mode input into a JSON matrix array
  prepare:
    runs-on: ubuntu-latest
    outputs:
      modes: ${{ steps.set-modes.outputs.modes }}
    steps:
      - id: set-modes
        run: |
          if [ "${{ inputs.mode }}" = "all" ]; then
            echo 'modes=["ranked","aram","urf","aram-mayhem"]' >> "$GITHUB_OUTPUT"
          else
            echo 'modes=["${{ inputs.mode }}"]' >> "$GITHUB_OUTPUT"
          fi

  crawl:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        mode: ${{ fromJson(needs.prepare.outputs.modes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Hardcore Manual Install Headless Shell (Bypass Playwright Hang)
        run: |
          # 1. 创建爬虫程序真正想要的绝对路径
          mkdir -p /home/runner/.cache/ms-playwright/chromium_headless_shell-1208
          
          # 2. 用 Linux 最稳的 curl 顺着网线直接下载它要的 headless-shell 包
          echo "Downloading target headless shell..."
          curl -sSL "https://cdn.playwright.dev/builds/cft/145.0.7632.6/linux64/chrome-headless-shell-linux64.zip" -o /tmp/shell.zip
          
          # 3. 原生静默解压
          echo "Extracting shell..."
          unzip -q /tmp/shell.zip -d /tmp/extracted_shell
          
          # 4. 严格按照报错里的预期路径，把解压出来的文件夹整个挪过去
          # 报错里找的是：.../chromium_headless_shell-1208/chrome-headless-shell-linux64/
          echo "Injecting into expected directory..."
          mv /tmp/extracted_shell/chrome-headless-shell-linux64 /home/runner/.cache/ms-playwright/chromium_headless_shell-1208/
          
          # 5. 清理现场
          rm -rf /tmp/shell.zip /tmp/extracted_shell
          echo "Headless Shell successfully injected manually!"
        shell: bash
        
      - name: Run crawler
        working-directory: packages/opgg
        run: |
          ARGS=""

          # Champion selection: specific list or --all
          if [ -n "${{ inputs.champions }}" ]; then
            ARGS="${{ inputs.champions }}"
          else
            ARGS="--all"
          fi

          ARGS="$ARGS --mode=${{ matrix.mode }}"
          ARGS="$ARGS --region=${{ inputs.region }}"
          ARGS="$ARGS --tier=${{ inputs.tier }}"
          ARGS="$ARGS --concurrency=${{ inputs.concurrency }}"
          ARGS="$ARGS --output=./output/${{ matrix.mode }}"

          echo "[ci] Running: pnpm start $ARGS"
          pnpm start $ARGS

      # ================== ✨ 新增：自动化重组路径结构 ==================
      - name: Restructure JSON for LoL Recommended Folder
        working-directory: packages/opgg
        run: |
          TARGET_DIR="./output/${{ matrix.mode }}"
          echo "Restructuring JSON files in $TARGET_DIR..."
          
          # 进入输出目录
          cd "$TARGET_DIR"
          
          # 遍历所有英雄的 JSON 文件（排除报告文件本身）
          for file in *.json; do
            # 如果没有匹配到任何 json 文件，退出循环
            [ -e "$file" ] || continue
            
            # 排除掉爬虫本身的全局报告文件，不让它生成文件夹
            if [[ "$file" == "crawl-report"* ]]; then
              echo "Skipping report file: $file"
              continue
            fi
            
            # 获取去除后缀后的英雄名字（如 Aatrox）
            champ_name="${file%.json}"
            
            # 创建对应的英雄文件夹
            mkdir -p "$champ_name"
            
            # 把 JSON 文件丢进去，并统一规范命名为 opgg_set.json（或者保持 $file 均可）
            # 游戏里只要在文件夹下，文件名叫什么都可以识别
            mv "$file" "$champ_name/"
          done
          echo "Restructure completed!"
      # ==================================================================

      - name: Write job summary
        if: always()
        working-directory: packages/opgg
        run: |
          MODE="${{ matrix.mode }}"
          # 【注意】因为上面移动了文件，如果 crawl-report 没被移走，这里路径依然有效
          REPORT_FILE="./output/${MODE}/crawl-report.json"
          if [ "$MODE" != "ranked" ]; then
            REPORT_FILE="./output/${MODE}/crawl-report-${MODE}.json"
          fi

          if [ ! -f "$REPORT_FILE" ]; then
            echo "## OP.GG Crawl — ${MODE}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> Report file not found — crawler may have failed before writing output." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TOTAL=$(jq '.total' "$REPORT_FILE")
          SUCCEEDED=$(jq '.succeeded' "$REPORT_FILE")
          PARTIAL=$(jq '.partial' "$REPORT_FILE")
          FAILED=$(jq '.failed' "$REPORT_FILE")
          GENERATED=$(jq -r '.generatedAt' "$REPORT_FILE")

          {
            echo "## OP.GG Crawl — ${MODE}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Mode** | \`${MODE}\` |"
            echo "| **Region** | \`${{ inputs.region }}\` |"
            echo "| **Tier** | \`${{ inputs.tier }}\` |"
            echo "| **Generated** | ${GENERATED} |"
            echo ""
            echo "### Results"
            echo ""
            echo "| Status | Count |"
            echo "|---|---|"
            echo "| ✅ Succeeded | ${SUCCEEDED} / ${TOTAL} |"
            echo "| ⚠️ Partial | ${PARTIAL} |"
            echo "| ❌ Failed | ${FAILED} |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Partial champions
          PARTIAL_LIST=$(jq -r '.champions[] | select(.status == "partial") | "| \(.champion) | \(.reason // "") | \(.runes) | \(.itemBuilds) |"' "$REPORT_FILE")
          if [ -n "$PARTIAL_LIST" ]; then
            {
              echo ""
              echo "### ⚠️ Partial Champions"
              echo ""
              echo "| Champion | Reason | Runes | Item Builds |"
              echo "|---|---|---|---|"
              echo "$PARTIAL_LIST"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          # Failed champions
          FAILED_LIST=$(jq -r '.champions[] | select(.status == "failed") | "| \(.champion) | \(.reason // "") |"' "$REPORT_FILE")
          if [ -n "$FAILED_LIST" ]; then
            {
              echo ""
              echo "### ❌ Failed Champions"
              echo ""
              echo "| Champion | Reason |"
              echo "|---|---|"
              echo "$FAILED_LIST"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$FAILED" = "0" ] && [ "$PARTIAL" = "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_All champions crawled successfully._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: opgg-${{ matrix.mode }}
          path: packages/opgg/output/${{ matrix.mode }}/
          if-no-files-found: warn
          retention-days: 30
